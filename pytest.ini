[pytest]
# Pytest configuration for Discord Bot Testing

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for bot features
    slow: Tests that take longer to run
    ramadan: Tests for Ramadan features
    api: Tests that involve API calls
    database: Tests that interact with bot_data.json
    scheduled: Tests for scheduled/automated tasks
    commands: Tests for bot commands
    buttons: Tests for button interactions
    embeds: Tests for embed validation
    roles: Tests for role assignment

# Asyncio mode
asyncio_mode = auto

# Minimum Python version
minversion = 3.10

# Console output
console_output_style = progress

# Log settings
log_cli = false
log_cli_level = INFO
log_file = tests/test_run.log
log_file_level = DEBUG
